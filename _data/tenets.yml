# The Tenets of The Church of Infinite Knowledge
# To add a new tenet, copy a block below and edit it.
# To reorder, drag-and-drop in the admin panel.
# The 'numeral' is shown before the title; you can use I/II/III or 1/2/3.

page:
  title: "Our Tenets"
  lede: "These are not commandments. They are commitments — the practices we hold ourselves to as members of this church. Knowledge that is not acted upon is unfinished; these tenets are how we finish it."

tenets:
  - numeral: "I"
    title: "Knowledge is sacred."
    body: >
      The pursuit of understanding — by ourselves, by others, by those not
      yet born — is the highest practice we know. To learn, to teach, to
      preserve, to share, and to create knowledge are the five sacred acts
      of this church.

  - numeral: "II"
    title: "Proportion belief to evidence."
    body: >
      We accept claims in proportion to the evidence offered for them, and
      no further. We make no appeals to gods, spirits, revelation, or any
      authority that asks us to stop asking. Faith — belief held in the
      absence of evidence or in defiance of it — is not a virtue here; it
      is the refusal to do the work that knowledge requires. We choose
      the harder honesty: to say "I do not yet know," to follow the
      evidence wherever it leads, and to change our minds when it
      changes course.

  - numeral: "III"
    title: "We reject violence — in deed and in support."
    body: >
      No truth is worth a wound. No idea is advanced by harm. We do not
      use force, threat, or intimidation, and we refuse to be silent when
      others do. We also refuse to fund, purchase from, work for, or
      lend our reputation to those who profit from violence. What we
      know to be cruel, we do not pay for.

  - numeral: "IV"
    title: "We reject coercion."
    body: >
      No one may be compelled into this church, and no one may be compelled
      to remain in it. We refuse manipulation, deception, social pressure,
      and exploitation as means of persuasion. We seek consent in all things.

  - numeral: "V"
    title: "Learn, always."
    body: >
      To live as a member of this church is to remain a student for life.
      We meet new information with curiosity rather than fear, and we
      revise our beliefs when the evidence asks us to.

  - numeral: "VI"
    title: "Teach freely."
    body: >
      What we have learned, we share. We mentor, we explain, we answer
      honestly, and we do not hoard understanding as a source of power
      over others.

  - numeral: "VII"
    title: "Preserve what is fragile."
    body: >
      Books burn. Languages die. Memories fade. We protect, archive, and
      pass forward the knowledge that would otherwise be lost — especially
      the knowledge of those whose voices have been overlooked.

  - numeral: "VIII"
    title: "Defend knowledge itself."
    body: >
      We stand against the burning of books, the silencing of teachers,
      the censoring of libraries, the corruption of records, and the
      deliberate spread of falsehood. We do not give our money, our labor,
      or our attention to institutions that distort, suppress, or destroy
      knowledge for power or profit. To harm knowledge is to harm everyone
      who would have inherited it.

  - numeral: "IX"
    title: "Share without gatekeeping."
    body: >
      Knowledge belongs to everyone. We oppose artificial barriers — of
      cost, caste, credential, or culture — that keep people from learning
      what they wish to learn.

  - numeral: "X"
    title: "Create with care, and act on what you know."
    body: >
      To make new knowledge is to take on responsibility for it. We work
      honestly, cite generously, correct our errors openly, and consider
      the consequences of what we bring into the world. And when our
      knowledge demands action — to speak up, to walk away, to withhold
      support, to help, to build, to repair — we act. Belief without
      practice is not yet faith; it is only opinion.
