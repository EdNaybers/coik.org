name: Build site

on:
  push:
    branches: [main]
    paths:
      - "_data/**"
      - "_templates/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build.yml"
  workflow_dispatch:

# Allow this workflow to push the regenerated HTML back to the repo.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Don't re-trigger ourselves: skip if the last commit was made by this workflow.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site
        run: npm run build

      - name: Commit regenerated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html tenets.html projects.html about.html join.html
          if git diff --cached --quiet; then
            echo "No HTML changes to commit."
          else
            git commit -m "Rebuild site from content [skip ci]"
            git push
          fi
