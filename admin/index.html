    Sveltia CMS — a maintained, single-developer fork of Decap CMS that
    supports logging in with a GitHub Personal Access Token directly,
    with no third-party auth proxy.

    To log in:
      1. Generate a fine-grained GitHub PAT scoped to ONLY this repo
         (EdNaybers/coik.org) with permission:
             Contents: Read and write
         See README-ADMIN.md for the exact step-by-step.
      2. Click the "Sign In With Token" option on the login screen.
      3. Paste your PAT. Sveltia stores it encrypted in your browser.

    If anything ever breaks here, you can always edit content directly
    on github.com by browsing to _data/ and using the GitHub web editor.
  -->
